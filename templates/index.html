<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Mining Hub</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color:white;
}

/* Top Bar */
.header {
    display:flex;
    justify-content:space-between;
    padding:18px 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo {
    font-weight:bold;
    color:#facc15;
}

/* Hero Price */
.hero {
    text-align:center;
    padding:60px 20px 30px;
}

.price {
    font-size:70px;
    font-weight:bold;
    color:#22c55e;
}

.sub {
    color:#94a3b8;
    margin-top:8px;
}

/* Grid */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    padding:20px 30px;
}

.card {
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px;
    transition:0.3s;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-6px);
    background: rgba(255,255,255,0.12);
}

.card h3 {
    margin:0 0 10px 0;
    color:#f8fafc;
}

.card p {
    color:#94a3b8;
}

/* Footer */
.footer {
    text-align:center;
    padding:25px;
    color:#64748b;
    margin-top:20px;
    border-top:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">🟡 Sudan Mining Hub</div>
    <div>LIVE MARKET</div>
</div>

<div class="hero">
    <div class="price">{{ gold_price }}</div>
    <div class="sub">Gold Price (USD per ounce)</div>
</div>

<div class="grid">

    <div class="card">
        <h3>📦 Orders</h3>
        <p>Manage buy & sell requests</p>
    </div>

    <div class="card">
        <h3>👤 Traders</h3>
        <p>Network overview</p>
    </div>

    <div class="card">
        <h3>⛏️ Mining</h3>
        <p>Equipment & resources</p>
    </div>

    <div class="card">
        <h3>📢 Ads</h3>
        <p>Market promotions</p>
    </div>

    <div class="card">
        <h3>💳 Subscription</h3>
        <p>3000 SDG / month</p>
    </div>

</div>

<div class="footer">
Sudan Mining Hub • Professional Mining Intelligence Platform
</div>

</body>
</html>
